name: CI/CD

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  api:
    name: API lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  k8s-smoke:
    name: Kubernetes smoke (kind)
    runs-on: ubuntu-latest
    needs: [api]
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: Build images
        run: |
          docker build -t kitchen-api:local ./api --target production
          docker build -t kitchen-web:local ./web-ui

      - name: Load images into kind
        run: |
          kind load docker-image kitchen-api:local
          kind load docker-image kitchen-web:local

      - name: Apply core manifests (dependency-safe)
        run: |
          kubectl apply -f k8s/namespace.yaml

          kubectl create configmap api-config --from-literal=PORT=3000 -n kitchen-app --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic mongodb-secret \
            --from-literal=mongo-root-username=admin \
            --from-literal=mongo-root-password=Secret123! \
            --from-literal=mongo-uri='mongodb://admin:Secret123!@mongodb-service.kitchen-app.svc.cluster.local:27017/kitchendb?authSource=admin' \
            -n kitchen-app --dry-run=client -o yaml | kubectl apply -f -

          kubectl apply -f k8s/db/statefulset.yaml
          kubectl rollout status statefulset/mongodb -n kitchen-app --timeout=180s

          kubectl apply -f k8s/api/deployment.yaml
          kubectl rollout status deployment/api-deployment -n kitchen-app --timeout=180s

          kubectl apply -f k8s/web-ui/deployment.yaml
          kubectl rollout status deployment/web-ui-deployment -n kitchen-app --timeout=180s

      - name: Apply monitoring manifests
        run: |
          kubectl apply -f k8s/monitoring/prometheus-config.yaml
          kubectl rollout status deployment/prometheus-deployment -n kitchen-app --timeout=180s

          kubectl apply -f k8s/monitoring/grafana-dashboard.yaml
          kubectl apply -f k8s/monitoring/grafana-deployment.yaml
          kubectl rollout status deployment/grafana-deployment -n kitchen-app --timeout=180s

      - name: In-cluster HTTP checks
        run: |
          kubectl run curl --image=curlimages/curl:8.6.0 -n kitchen-app --restart=Never --rm -i -- \
            sh -lc "curl -sf http://api:3000/health | grep -q 'ok'"
          kubectl run curl --image=curlimages/curl:8.6.0 -n kitchen-app --restart=Never --rm -i -- \
            sh -lc "curl -sf http://api:3000/metrics | grep -q 'http_requests_total'"
